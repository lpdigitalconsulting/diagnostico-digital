<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diagnóstico de Madurez Digital — LP Digital Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
:root{
  --bg:#020810;--s1:#060f1e;--s2:#091525;
  --cyan:#00E5FF;--c2:rgba(0,229,255,.12);--c3:rgba(0,229,255,.05);
  --gold:#F0A500;--g2:rgba(240,165,0,.1);
  --green:#00E5A0;--red:#FF4D6D;--purple:#8B5CF6;
  --white:#EEF4FF;--muted:#4A6080;--muted2:#1E3048;
  --f1:"Syne",sans-serif;--f2:"DM Sans",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--f2);background:var(--bg);color:var(--white);overflow-x:hidden;line-height:1.6;}

/* ── TECH BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridPulse 10s ease-in-out infinite;
}
@keyframes gridPulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.scanline{
  position:fixed;left:0;right:0;height:1px;z-index:0;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,.3),transparent);
  animation:scan 8s linear infinite;pointer-events:none;
}
@keyframes scan{from{top:-2px;}to{top:100vh;}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.o1{width:700px;height:700px;background:rgba(0,229,255,.05);top:-250px;right:-200px;animation:of1 14s ease-in-out infinite;}
.o2{width:600px;height:600px;background:rgba(240,165,0,.04);bottom:-150px;left:-200px;animation:of2 18s ease-in-out infinite;}
.o3{width:400px;height:400px;background:rgba(139,92,246,.04);top:40%;left:50%;animation:of3 12s ease-in-out infinite;}
@keyframes of1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,50px);}}
@keyframes of2{0%,100%{transform:translate(0,0);}50%{transform:translate(50px,-40px);}}
@keyframes of3{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.3);}}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 2rem;
  background:rgba(2,8,16,.88);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,229,255,.07);
}
.logo{font-family:var(--f1);font-size:.95rem;font-weight:800;letter-spacing:-.02em;display:flex;flex-direction:column;line-height:1;}
.logo em{font-style:normal;color:var(--cyan);}
.logo-sub{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.nav-center{display:flex;align-items:center;gap:6px;}
.ndot{width:7px;height:7px;border-radius:50%;background:var(--muted2);transition:all .3s;}
.ndot.active{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.ndot.done{background:var(--green);}
.nstep{font-size:.68rem;color:var(--muted);font-weight:500;margin-left:8px;font-family:var(--f1);}
.nav-cta{
  display:flex;align-items:center;gap:8px;
  font-size:.72rem;font-weight:600;color:var(--muted);
  background:none;border:none;cursor:pointer;font-family:var(--f2);
  transition:color .2s;padding:.4rem .8rem;border-radius:50px;
}
.nav-cta:hover{color:var(--white);}

/* ── LAYOUT ── */
.sec{position:relative;z-index:1;min-height:100vh;padding:5rem 1.5rem 3rem;display:flex;flex-direction:column;}
.wrap{max-width:820px;width:100%;margin:0 auto;}
.hidden{display:none!important;}

/* ── HERO ── */
#s-hero{align-items:center;justify-content:center;text-align:center;padding-top:4.5rem;}
.hero-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);
  border-radius:50px;padding:.35rem 1rem;
  font-size:.65rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--cyan);margin-bottom:1.75rem;
}
.hero-h1{
  font-family:var(--f1);
  font-size:clamp(2.6rem,7vw,5.2rem);
  font-weight:800;line-height:.98;letter-spacing:-.03em;
  margin-bottom:1.25rem;
}
.hero-h1 .c{color:var(--cyan);}
.hero-h1 .ghost{color:transparent;-webkit-text-stroke:1.5px rgba(238,244,255,.18);}
.hero-p{
  font-size:1rem;font-weight:300;color:rgba(238,244,255,.6);
  line-height:1.8;max-width:520px;margin:0 auto 2.5rem;
}
.btn-start{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--cyan);color:var(--bg);
  font-family:var(--f1);font-size:.88rem;font-weight:800;
  padding:.95rem 2.75rem;border-radius:50px;border:none;cursor:pointer;
  transition:all .25s;letter-spacing:.05em;
  position:relative;overflow:hidden;
}
.btn-start:hover{box-shadow:0 0 50px rgba(0,229,255,.5);transform:translateY(-2px);}

/* ── FORM ── */
.card{
  background:rgba(6,14,28,.85);border:1px solid rgba(0,229,255,.1);
  border-radius:22px;padding:2.25rem;backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;}
.fgrp{display:flex;flex-direction:column;gap:5px;}
label{font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
input,select{
  background:rgba(0,229,255,.025);border:1px solid rgba(255,255,255,.07);
  border-radius:11px;padding:.75rem 1rem;
  color:var(--white);font-family:var(--f2);font-size:.875rem;
  transition:all .2s;
}
input:focus{border-color:var(--cyan);background:rgba(0,229,255,.05);}
.btn-p{
  background:var(--cyan);color:var(--bg);font-family:var(--f1);
  font-size:.8rem;font-weight:800;padding:.75rem 1.9rem;border-radius:50px;
  border:none;cursor:pointer;transition:all .2s;
}

/* ── QUIZ ── */
.qcard{
  background:rgba(6,14,28,.88);border:1px solid rgba(0,229,255,.1);
  border-radius:20px;padding:2.25rem;backdrop-filter:blur(14px);
}
.qtxt{font-family:var(--f1);font-size:1.4rem;font-weight:700;margin-bottom:1.75rem;line-height:1.3;}
.opts{display:grid;gap:9px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);
  border-radius:13px;padding:.9rem 1.1rem;cursor:pointer;transition:all .18s;
  color:var(--white);font-family:var(--f2);width:100%;text-align:left;
}
.opt:hover{border-color:var(--cyan);background:rgba(0,229,255,.04);}
.opt.sel{background:rgba(0,229,255,.08);border-color:var(--cyan);}

/* ── RESULTS ── */
.res-hero{
  background:linear-gradient(135deg,rgba(6,14,28,.92),rgba(9,21,37,.92));
  border:1px solid rgba(0,229,255,.12);border-radius:24px;
  padding:2.75rem;text-align:center;margin-bottom:1.25rem;backdrop-filter:blur(12px);
}
.score-pct{font-family:var(--f1);font-size:4rem;font-weight:800;color:var(--cyan);line-height:1;}

#overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(2,8,16,.96);backdrop-filter:blur(16px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
}
#overlay.show{display:flex;}
.ring{width:72px;height:72px;border-radius:50%;border:3px solid rgba(0,229,255,.1);border-top-color:var(--cyan);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<div id="overlay">
  <div class="ring"></div>
  <div style="color:var(--cyan);font-family:var(--f1);letter-spacing:2px;font-size:0.8rem;text-transform:uppercase;">Procesando diagnóstico</div>
</div>

<nav>
  <div class="logo">
    <span>LP<em>.</em>Digital Consulting</span>
    <span class="logo-sub">Tech Strategy & Innovation</span>
  </div>
  <div class="nav-center" id="nav-dots">
    <div class="ndot active"></div><div class="ndot"></div><div class="ndot"></div>
    <span class="nstep" id="nstep-txt">Paso 1: Datos</span>
  </div>
  <button class="nav-cta" id="btn-back" onclick="location.reload()" style="display:none;">← Reiniciar</button>
</nav>

<section class="sec" id="s-hero">
  <div class="wrap">
    <div class="hero-chip"><span>●</span> Assessment 2026</div>
    <h1 class="hero-h1">Diagnóstico de<br><span class="c">Madurez Digital</span></h1>
    <p class="hero-p">Analizamos 6 dimensiones clave para determinar el nivel de evolución tecnológica de tu organización.</p>
    <button class="btn-start" onclick="show('s-form')">Iniciar diagnóstico →</button>
  </div>
</section>

<section class="sec hidden" id="s-form">
  <div class="wrap">
    <div class="card">
      <div class="fgrid">
        <div class="fgrp"><label>Empresa</label><input id="fe" placeholder="Nombre de la empresa"></div>
        <div class="fgrp"><label>Nombre del Líder</label><input id="fn" placeholder="Tu nombre completo"></div>
        <div class="fgrp"><label>Cargo / Rol</label><input id="fc" placeholder="Ej. Gerente de TI"></div>
        <div class="fgrp"><label>WhatsApp / Tel</label><input id="ft" placeholder="+52 ..."></div>
        <div class="fgrp"><label>Sector</label>
          <select id="fs">
            <option value="Servicios">Servicios</option>
            <option value="Manufactura">Manufactura</option>
            <option value="Retail">Retail / eCommerce</option>
            <option value="Financiero">Financiero</option>
          </select>
        </div>
        <div class="fgrp"><label>Presupuesto TI</label>
          <select id="fb">
            <option value="Limitado">Limitado / Por proyecto</option>
            <option value="Estándar">Presupuesto Anual</option>
            <option value="Inversión">Inversión Agresiva</option>
          </select>
        </div>
        <div class="fgrp" style="grid-column: 1 / -1;"><label>Email Corporativo</label><input id="fm" placeholder="correo@empresa.com"></div>
      </div>
      <button class="btn-p" style="margin-top:20px;width:100%;" onclick="startQuiz()">Comenzar evaluación →</button>
    </div>
  </div>
</section>

<section class="sec hidden" id="s-quiz">
  <div class="wrap">
    <div id="quiz-container">
      <div class="qcard">
        <div id="qcat" style="font-size:0.6rem;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;font-family:var(--f1);letter-spacing:2px;">Cargando...</div>
        <div class="qtxt" id="qtxt">...</div>
        <div class="opts" id="opts"></div>
      </div>
    </div>
  </div>
</section>

<section class="sec hidden" id="s-res">
  <div class="wrap">
    <div class="res-hero">
      <div id="res-name" style="font-family:var(--f1);font-size:1.5rem;font-weight:700;margin-bottom:10px;"></div>
      <div class="score-pct" id="res-score">0%</div>
      <div id="res-level" style="font-family:var(--f1);font-weight:800;color:var(--white);text-transform:uppercase;margin:20px 0;letter-spacing:3px;">NIVEL</div>
      <p id="res-desc" style="color:var(--muted);max-width:500px;margin:0 auto;"></p>
    </div>
    <button class="btn-p" style="width:100%;" onclick="location.reload()">Nuevo Diagnóstico</button>
  </div>
</section>

<script>
// 1. INICIALIZACIÓN EMAILJS CON TUS CLAVES
(function(){
    emailjs.init("Dku1oAep87GYPl5SZ");
})();

// Datos del Cuestionario
const questions = [
  {c:"Estrategia", q:"¿Su empresa cuenta con una hoja de ruta (Roadmap) de transformación digital?", o:[{t:"No existe",p:0},{t:"Basada en necesidades inmediatas",p:1},{t:"Estrategia clara y documentada",p:3}]},
  {c:"Cultura", q:"¿Qué tan abierta está la organización a adoptar nuevas herramientas tecnológicas?", o:[{t:"Resistencia al cambio",p:0},{t:"Adopción parcial",p:2},{t:"Cultura de innovación continua",p:3}]},
  {c:"Infraestructura", q:"¿Dónde residen principalmente sus sistemas y datos?", o:[{t:"Servidores físicos locales",p:0},{t:"Híbrido",p:2},{t:"100% Cloud (Nube)",p:3}]},
  {c:"Datos", q:"¿Cómo se toman las decisiones críticas en el negocio?", o:[{t:"Intuición o experiencia",p:0},{t:"Reportes básicos",p:1},{t:"Análisis de datos avanzado (BI)",p:3}]}
];

let currentQ = 0, points = 0, userData = {};

function show(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startQuiz(){
  userData = {
    empresa: document.getElementById('fe').value,
    nombre: document.getElementById('fn').value,
    cargo: document.getElementById('fc').value,
    tel: document.getElementById('ft').value,
    email: document.getElementById('fm').value,
    sector: document.getElementById('fs').value,
    budget: document.getElementById('fb').value
  };
  if(!userData.empresa || !userData.email) return alert("Por favor complete los datos básicos.");
  
  document.getElementById('nstep-txt').innerText = "Paso 2: Diagnóstico";
  document.getElementById('nav-dots').children[1].classList.add('active');
  show('s-quiz');
  renderQuestion();
}

function renderQuestion(){
  const q = questions[currentQ];
  document.getElementById('qcat').innerText = q.c;
  document.getElementById('qtxt').innerText = q.q;
  const optsDiv = document.getElementById('opts');
  optsDiv.innerHTML = '';
  q.o.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerText = opt.t;
    btn.onclick = () => selectOpt(opt.p);
    optsDiv.appendChild(btn);
  });
}

function selectOpt(p){
  points += p;
  currentQ++;
  if(currentQ < questions.length) renderQuestion();
  else finish();
}

function finish(){
  document.getElementById('overlay').classList.add('show');
  
  // SOLUCIÓN AL ERROR: Calculamos TODO antes de usarlo en el objeto
  const totalMax = questions.length * 3;
  const calculatedPct = Math.round((points / totalMax) * 100);
  
  let calculatedLevel = "Principiante";
  let desc = "Digitalización básica. Es momento de trazar una ruta crítica.";
  
  if(calculatedPct > 40) {
    calculatedLevel = "Evolutivo";
    desc = "Bases sólidas. Falta integración profunda y automatización.";
  }
  if(calculatedPct > 75) {
    calculatedLevel = "Transformado";
    desc = "Liderazgo digital. La tecnología es el núcleo de su competitividad.";
  }

  // Ahora sí creamos el objeto de parámetros sin errores
  const templateParams = {
    empresa: userData.empresa,
    nombre: userData.nombre,
    email: userData.email,
    telefono: userData.tel,
    score: calculatedPct + "%",
    level: calculatedLevel,
    message: `Resultados del diagnóstico: ${calculatedPct}% - Nivel ${calculatedLevel}. Sector: ${userData.sector}.`
  };

  // Envío a EmailJS con tus ServiceID y TemplateID
  emailjs.send("service_olgtht6", "template_if7ffam", templateParams)
    .then(() => console.log("Reporte enviado correctamente"))
    .catch(err => console.error("Error EmailJS:", err));

  // Mostrar resultados finales en pantalla
  setTimeout(() => {
    document.getElementById('overlay').classList.remove('show');
    show('s-res');
    document.getElementById('res-name').innerText = userData.empresa;
    document.getElementById('res-score').innerText = calculatedPct + "%";
    document.getElementById('res-level').innerText = calculatedLevel;
    document.getElementById('res-desc').innerText = desc;
    document.getElementById('nstep-txt').innerText = "Diagnóstico Completo";
    document.getElementById('nav-dots').querySelectorAll('.ndot').forEach(d=>d.classList.add('done'));
  }, 1800);
}

// Fondo Animado (Canvas) - Partículas
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let pts = [];
function initCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  pts = [];
  for(let i=0; i<40; i++) pts.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*0.3,
    vy: (Math.random()-0.5)*0.3,
    s: Math.random()*2
  });
}
function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(0,229,255,0.15)";
  pts.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
window.addEventListener('resize', initCanvas);
initCanvas();
anim();
</script>

</body>
</html>
